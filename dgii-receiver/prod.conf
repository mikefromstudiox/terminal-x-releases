server {
    listen 443 ssl;
    server_name studioxmedia.io www.studioxmedia.io;

    ssl_certificate /etc/letsencrypt/live/studioxmedia.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studioxmedia.io/privkey.pem;

    client_max_body_size 2G;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://frontend:5173;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl;
    server_name fe.terminalxpos.com;

    ssl_certificate /etc/letsencrypt/live/fe.terminalxpos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fe.terminalxpos.com/privkey.pem;

    location / {
        proxy_pass http://172.17.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name fe.terminalxpos.com;
    return 301 https://$host$request_uri;
}
