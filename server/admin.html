<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Terminal X — Licencias</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;color:#1e293b;min-height:100vh}
  :root{--sky:#0ea5e9;--sky-dark:#0284c7;--red:#ef4444;--green:#22c55e;--amber:#f59e0b;--slate:#64748b}

  /* ── Auth ── */
  #auth{display:flex;align-items:center;justify-content:center;min-height:100vh}
  .auth-card{background:#fff;border-radius:20px;box-shadow:0 20px 60px rgba(0,0,0,.1);padding:40px;width:360px;text-align:center}
  .logo{width:56px;height:56px;background:var(--sky);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-weight:900;font-size:18px;color:#fff;letter-spacing:-1px}
  .auth-card h1{font-size:20px;font-weight:700;margin-bottom:4px}
  .auth-card p{color:var(--slate);font-size:13px;margin-bottom:24px}
  input[type=password],input[type=text],input[type=number],select,textarea{width:100%;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-size:14px;outline:none;transition:border-color .2s;background:#f8fafc;color:#1e293b}
  input:focus,select:focus,textarea:focus{border-color:var(--sky);background:#fff}
  textarea{resize:vertical;min-height:60px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
  .btn-primary{background:var(--sky);color:#fff}.btn-primary:hover{background:var(--sky-dark)}
  .btn-ghost{background:transparent;color:var(--slate);border:1.5px solid #e2e8f0}.btn-ghost:hover{background:#f1f5f9;color:#1e293b}
  .btn-red{background:#fee2e2;color:var(--red)}.btn-red:hover{background:#fecaca}
  .btn-green{background:#dcfce7;color:#15803d}.btn-green:hover{background:#bbf7d0}
  .btn-amber{background:#fef3c7;color:#92400e}.btn-amber:hover{background:#fde68a}
  .btn-sm{padding:6px 12px;font-size:12px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .auth-err{color:var(--red);font-size:12px;margin-top:8px}

  /* ── Layout ── */
  #app{display:none}
  .topbar{background:#fff;border-bottom:1px solid #e2e8f0;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .topbar-left{display:flex;align-items:center;gap:12px}
  .topbar h1{font-size:16px;font-weight:700}
  .topbar p{font-size:12px;color:var(--slate)}
  .content{padding:24px;max-width:1400px;margin:0 auto}

  /* ── Stats ── */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
  .stat{background:#fff;border-radius:12px;padding:16px;border:1px solid #e2e8f0}
  .stat-val{font-size:28px;font-weight:800;line-height:1}
  .stat-lbl{font-size:11px;color:var(--slate);margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}

  /* ── Toolbar ── */
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .search-wrap{flex:1;min-width:200px;position:relative}
  .search-wrap input{padding-left:34px}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:14px}

  /* ── Table ── */
  .table-wrap{background:#fff;border-radius:14px;border:1px solid #e2e8f0;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead{background:#f8fafc}
  th{padding:10px 14px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--slate);white-space:nowrap}
  td{padding:11px 14px;border-top:1px solid #f1f5f9;vertical-align:middle}
  tr:hover td{background:#f8fafc}
  .badge{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700}
  .badge-active{background:#dcfce7;color:#15803d}
  .badge-pending{background:#e0f2fe;color:#0369a1}
  .badge-inactive{background:#f1f5f9;color:var(--slate)}
  .badge-suspended{background:#fee2e2;color:var(--red)}
  .badge-expired{background:#fef3c7;color:#92400e}
  .mono{font-family:monospace;font-size:12px;background:#f1f5f9;padding:2px 7px;border-radius:6px}
  .actions{display:flex;gap:4px;flex-wrap:wrap}
  .empty{padding:48px;text-align:center;color:var(--slate)}

  /* ── Modal ── */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;align-items:center;justify-content:center;padding:20px}
  .overlay.open{display:flex}
  .modal{background:#fff;border-radius:18px;width:100%;max-width:480px;box-shadow:0 24px 64px rgba(0,0,0,.15);overflow:hidden}
  .modal-head{padding:20px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
  .modal-head h2{font-size:16px;font-weight:700}
  .modal-body{padding:24px;display:flex;flex-direction:column;gap:14px}
  .modal-foot{padding:16px 24px;border-top:1px solid #f1f5f9;display:flex;justify-content:flex-end;gap:8px}
  label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--slate);margin-bottom:5px}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

  /* ── Key display ── */
  .key-result{background:#f0f9ff;border:2px solid var(--sky);border-radius:12px;padding:16px;text-align:center;margin-top:8px}
  .key-result code{font-size:18px;font-weight:800;font-family:monospace;letter-spacing:2px;color:#0369a1;display:block;margin-bottom:8px}

  /* ── Toast ── */
  #toast{position:fixed;bottom:24px;right:24px;background:#1e293b;color:#fff;padding:12px 18px;border-radius:12px;font-size:13px;font-weight:600;transform:translateY(80px);opacity:0;transition:all .3s;z-index:200}
  #toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<!-- ── Auth Screen ── -->
<div id="auth">
  <div class="auth-card">
    <div class="logo">TX</div>
    <h1>Terminal X Admin</h1>
    <p>Panel de gestión de licencias</p>
    <div style="margin-top:20px">
      <input type="password" id="adminKeyInput" placeholder="Admin API Key" onkeydown="if(event.key==='Enter')login()" />
      <div id="authErr" class="auth-err"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:12px;justify-content:center" onclick="login()">Entrar</button>
    </div>
  </div>
</div>

<!-- ── App ── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo" style="width:36px;height:36px;font-size:13px;border-radius:10px">TX</div>
      <div>
        <div class="topbar" style="all:unset;display:flex;flex-direction:column">
          <span style="font-size:15px;font-weight:700">Terminal X Licencias</span>
          <span style="font-size:11px;color:var(--slate)">Panel de administración</span>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="exportCsv()">⬇ Exportar CSV</button>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats" id="stats">
      <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Total</div></div>
      <div class="stat"><div class="stat-val" style="color:#15803d" id="s-active">—</div><div class="stat-lbl">Activas</div></div>
      <div class="stat"><div class="stat-val" style="color:#0369a1" id="s-pending">—</div><div class="stat-lbl">Pendientes</div></div>
      <div class="stat"><div class="stat-val" style="color:#92400e" id="s-expiring">—</div><div class="stat-lbl">Vencen pronto</div></div>
      <div class="stat"><div class="stat-val" style="color:var(--red)" id="s-expired">—</div><div class="stat-lbl">Vencidas</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar por nombre, RNC, clave..." oninput="renderTable()" />
      </div>
      <select id="filterStatus" onchange="renderTable()" style="width:160px">
        <option value="">Todos los estados</option>
        <option value="active">Activas</option>
        <option value="pending">Pendientes</option>
        <option value="suspended">Suspendidas</option>
        <option value="inactive">Inactivas</option>
      </select>
      <button class="btn btn-primary" onclick="openCreate()">+ Nueva Licencia</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Negocio</th>
            <th>RNC</th>
            <th>Clave</th>
            <th>Plan</th>
            <th>Estado</th>
            <th>Vencimiento</th>
            <th>Último acceso</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="emptyState" class="empty" style="display:none">No hay licencias que mostrar.</div>
    </div>
  </div>
</div>

<!-- ── Create Modal ── -->
<div class="overlay" id="createModal">
  <div class="modal">
    <div class="modal-head">
      <h2>Nueva Licencia</h2>
      <button class="btn btn-ghost btn-sm" onclick="closeCreate()">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <label>Nombre del Negocio</label>
        <input type="text" id="c-name" placeholder="Ej: Car Wash Rápido SRL" />
      </div>
      <div class="field-row">
        <div>
          <label>RNC / Cédula</label>
          <input type="text" id="c-rnc" placeholder="Ej: 130123456" />
        </div>
        <div>
          <label>Plan</label>
          <select id="c-plan">
            <option value="standard">Standard</option>
            <option value="pro">Pro</option>
            <option value="enterprise">Enterprise</option>
            <option value="trial">Trial</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div>
          <label>Duración (meses)</label>
          <input type="number" id="c-months" value="12" min="1" max="60" />
        </div>
        <div>
          <label>Máx. usuarios</label>
          <input type="number" id="c-users" value="10" min="1" max="999" />
        </div>
      </div>
      <div>
        <label>Notas</label>
        <textarea id="c-notes" placeholder="Notas opcionales..."></textarea>
      </div>
      <div id="createResult" style="display:none">
        <div class="key-result">
          <code id="newKey"></code>
          <button class="btn btn-ghost btn-sm" onclick="copyKey()">Copiar clave</button>
        </div>
      </div>
      <div id="createErr" style="color:var(--red);font-size:12px;display:none"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeCreate()">Cancelar</button>
      <button class="btn btn-primary" id="createBtn" onclick="createLicense()">Crear Licencia</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
  let ADMIN_KEY = ''
  let licenses  = []

  // ── Auth ─────────────────────────────────────────────────────────────────────
  function login() {
    const k = document.getElementById('adminKeyInput').value.trim()
    if (!k) return
    ADMIN_KEY = k
    loadLicenses()
      .then(() => {
        sessionStorage.setItem('tx_admin_key', k)
        document.getElementById('auth').style.display = 'none'
        document.getElementById('app').style.display  = 'block'
      })
      .catch(() => {
        document.getElementById('authErr').textContent = 'Clave incorrecta o servidor no disponible.'
        ADMIN_KEY = ''
      })
  }

  function logout() {
    sessionStorage.removeItem('tx_admin_key')
    location.reload()
  }

  // Auto-login from session
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('tx_admin_key')
    if (saved) { document.getElementById('adminKeyInput').value = saved; login() }
  })

  // ── API helpers ───────────────────────────────────────────────────────────────
  async function api(method, path, body) {
    const r = await fetch(path, {
      method,
      headers: { 'Content-Type': 'application/json', 'x-admin-key': ADMIN_KEY },
      body: body ? JSON.stringify(body) : undefined,
    })
    if (!r.ok && r.status === 401) throw new Error('unauthorized')
    return r.json()
  }

  async function loadLicenses() {
    const res = await api('GET', '/api/licenses')
    licenses = res.data || []
    updateStats()
    renderTable()
  }

  // ── Stats ─────────────────────────────────────────────────────────────────────
  function updateStats() {
    const now = new Date()
    document.getElementById('s-total').textContent   = licenses.length
    document.getElementById('s-active').textContent  = licenses.filter(l => l.status === 'active').length
    document.getElementById('s-pending').textContent = licenses.filter(l => l.status === 'pending').length
    document.getElementById('s-expiring').textContent = licenses.filter(l => {
      if (!l.expires_at) return false
      const d = Math.floor((new Date(l.expires_at) - now) / 86400000)
      return d >= 0 && d <= 30
    }).length
    document.getElementById('s-expired').textContent = licenses.filter(l => {
      if (!l.expires_at) return false
      return new Date(l.expires_at) < now
    }).length
  }

  // ── Table ─────────────────────────────────────────────────────────────────────
  function renderTable() {
    const q      = document.getElementById('searchInput').value.toLowerCase()
    const status = document.getElementById('filterStatus').value
    const rows   = licenses.filter(l => {
      const match = !q || [l.business_name, l.business_rnc, l.license_key, l.plan].some(v => (v||'').toLowerCase().includes(q))
      const st    = !status || l.status === status
      return match && st
    })

    const tbody = document.getElementById('tableBody')
    const empty = document.getElementById('emptyState')

    if (!rows.length) {
      tbody.innerHTML = ''
      empty.style.display = 'block'
      return
    }
    empty.style.display = 'none'

    tbody.innerHTML = rows.map(l => {
      const expiry = l.expires_at ? new Date(l.expires_at).toLocaleDateString('es-DO') : '—'
      const seen   = l.last_seen  ? new Date(l.last_seen).toLocaleDateString('es-DO')  : 'Nunca'
      const badge  = {
        active:    '<span class="badge badge-active">Activa</span>',
        pending:   '<span class="badge badge-pending">Pendiente</span>',
        inactive:  '<span class="badge badge-inactive">Inactiva</span>',
        suspended: '<span class="badge badge-suspended">Suspendida</span>',
      }[l.status] || `<span class="badge badge-inactive">${l.status}</span>`

      return `<tr>
        <td style="font-weight:600;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${l.business_name}">${l.business_name}</td>
        <td style="white-space:nowrap">${l.business_rnc}</td>
        <td><span class="mono">${l.license_key}</span>
          <button style="all:unset;cursor:pointer;margin-left:4px;opacity:.5" title="Copiar" onclick="copyText('${l.license_key}')">📋</button>
        </td>
        <td style="text-transform:capitalize">${l.plan}</td>
        <td>${badge}</td>
        <td style="white-space:nowrap">${expiry}</td>
        <td style="white-space:nowrap;color:var(--slate)">${seen}</td>
        <td>
          <div class="actions">
            ${l.status !== 'active' ? `<button class="btn btn-green btn-sm" onclick="setStatus('${l.id}','active')">Activar</button>` : ''}
            ${l.status === 'active' ? `<button class="btn btn-amber btn-sm" onclick="setStatus('${l.id}','suspended')">Suspender</button>` : ''}
            ${l.status !== 'inactive' ? `<button class="btn btn-red btn-sm" onclick="deactivate('${l.id}')">Desactivar</button>` : ''}
            <button class="btn btn-ghost btn-sm" onclick="extendMonths('${l.id}',6)">+6m</button>
            <button class="btn btn-ghost btn-sm" onclick="extendMonths('${l.id}',12)">+1a</button>
            <button class="btn btn-ghost btn-sm" onclick="resetHw('${l.id}')" title="Liberar hardware">🔄 HW</button>
          </div>
        </td>
      </tr>`
    }).join('')
  }

  // ── Actions ───────────────────────────────────────────────────────────────────
  async function setStatus(id, status) {
    await api('PATCH', `/api/licenses/${id}`, { status })
    toast(`Estado cambiado a: ${status}`)
    await loadLicenses()
  }

  async function deactivate(id) {
    if (!confirm('¿Desactivar esta licencia?')) return
    await api('DELETE', `/api/licenses/${id}`)
    toast('Licencia desactivada')
    await loadLicenses()
  }

  async function extendMonths(id, months) {
    const lic = licenses.find(l => l.id === id)
    const base = (lic?.expires_at && new Date(lic.expires_at) > new Date())
      ? new Date(lic.expires_at)
      : new Date()
    const expires_at = new Date(base.getTime() + months * 30 * 86400000).toISOString()
    await api('PATCH', `/api/licenses/${id}`, { expires_at, status: 'active' })
    toast(`Licencia extendida ${months} meses`)
    await loadLicenses()
  }

  async function resetHw(id) {
    if (!confirm('¿Liberar el hardware ID? El cliente podrá activar en un nuevo equipo.')) return
    await api('PATCH', `/api/licenses/${id}`, { hardware_id: null, activated_at: null, status: 'pending' })
    toast('Hardware ID liberado')
    await loadLicenses()
  }

  // ── Create modal ──────────────────────────────────────────────────────────────
  function openCreate() {
    document.getElementById('createModal').classList.add('open')
    document.getElementById('createResult').style.display = 'none'
    document.getElementById('createErr').style.display    = 'none'
    document.getElementById('createBtn').textContent      = 'Crear Licencia'
    ;['c-name','c-rnc','c-notes'].forEach(id => document.getElementById(id).value = '')
    document.getElementById('c-months').value = '12'
    document.getElementById('c-users').value  = '10'
    document.getElementById('c-plan').value   = 'standard'
  }

  function closeCreate() {
    document.getElementById('createModal').classList.remove('open')
    loadLicenses()
  }

  async function createLicense() {
    const name   = document.getElementById('c-name').value.trim()
    const rnc    = document.getElementById('c-rnc').value.trim()
    const plan   = document.getElementById('c-plan').value
    const months = parseInt(document.getElementById('c-months').value) || null
    const users  = parseInt(document.getElementById('c-users').value) || 10
    const notes  = document.getElementById('c-notes').value.trim()
    const errEl  = document.getElementById('createErr')

    if (!name || !rnc) { errEl.textContent = 'Nombre y RNC son obligatorios.'; errEl.style.display='block'; return }
    errEl.style.display = 'none'

    const btn = document.getElementById('createBtn')
    btn.disabled = true; btn.textContent = 'Creando...'
    try {
      const res = await api('POST', '/api/licenses', { business_name: name, business_rnc: rnc, plan, months, max_users: users, notes })
      document.getElementById('newKey').textContent = res.data.license_key
      document.getElementById('createResult').style.display = 'block'
      btn.textContent = 'Cerrar'
      btn.onclick     = closeCreate
      btn.disabled    = false
    } catch (e) {
      errEl.textContent = 'Error al crear licencia: ' + e.message
      errEl.style.display = 'block'
      btn.disabled = false; btn.textContent = 'Crear Licencia'
    }
  }

  // ── CSV export ────────────────────────────────────────────────────────────────
  function exportCsv() {
    const hdr = ['Negocio','RNC','Clave','Plan','Estado','Vencimiento','Activado','Último acceso','Máx usuarios','Notas']
    const rows = licenses.map(l => [
      l.business_name, l.business_rnc, l.license_key, l.plan, l.status,
      l.expires_at||'', l.activated_at||'', l.last_seen||'', l.max_users, l.notes||'',
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(','))
    const csv  = [hdr.join(','), ...rows].join('\n')
    const a    = document.createElement('a')
    a.href     = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }))
    a.download = `licencias-terminalx-${new Date().toISOString().slice(0,10)}.csv`
    a.click()
  }

  // ── Helpers ───────────────────────────────────────────────────────────────────
  function copyKey()          { copyText(document.getElementById('newKey').textContent) }
  function copyText(text)     { navigator.clipboard?.writeText(text); toast('Copiado al portapapeles') }

  function toast(msg) {
    const el = document.getElementById('toast')
    el.textContent = msg
    el.classList.add('show')
    setTimeout(() => el.classList.remove('show'), 2500)
  }
</script>
</body>
</html>
